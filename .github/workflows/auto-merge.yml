name: Auto-merge

# Enable squash auto-merge on every PR targeting main so it merges
# automatically once all required checks (promotion-review, verify) pass.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  enable:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
