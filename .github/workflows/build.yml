name: Build

# Required check on test and main promotions — must pass alongside promotion-review.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, test]

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
